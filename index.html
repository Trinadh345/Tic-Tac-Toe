cat <<EOF > index.html
<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe DevSecOps</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: white; border: 2px solid #333; font-size: 2em; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Trinadh DevSecOps Project Live</h1>
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div><div class="cell" onclick="makeMove(1)"></div><div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div><div class="cell" onclick="makeMove(4)"></div><div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div><div class="cell" onclick="makeMove(7)"></div><div class="cell" onclick="makeMove(8)"></div>
    </div>
    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        function makeMove(i) {
            if (board[i] === "") {
                board[i] = currentPlayer;
                document.getElementsByClassName('cell')[i].innerText = currentPlayer;
                currentPlayer = currentPlayer === "X" ? "O" : "X";
            }
        }
    </script>
</body>
</html>
EOF
